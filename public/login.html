<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Customer Sign In | The Family Pantry</title>
    <style>
      :root {
        --ink: #202d24;
        --muted: #647168;
        --leaf: #387a4a;
        --leaf-dark: #285c37;
        --line: #d8e2d8;
        --background: #eef8e9;
      }
      * {
        box-sizing: border-box;
      }
      body {
        background: var(--background);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
        margin: 0;
        min-height: 100vh;
        padding: 28px 16px;
      }
      main {
        margin: 0 auto;
        max-width: 440px;
      }
      .logo {
        display: block;
        margin: 0 auto 20px;
        max-width: 420px;
        width: 92%;
      }
      .card {
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: 0 14px 38px rgba(32, 45, 36, 0.1);
        padding: 30px;
      }
      h1 {
        font-size: 25px;
        margin: 0 0 8px;
        text-align: center;
      }
      .intro {
        color: var(--muted);
        line-height: 1.5;
        margin: 0 0 24px;
        text-align: center;
      }
      .field {
        display: grid;
        gap: 7px;
        margin-bottom: 15px;
      }
      label {
        font-size: 13px;
        font-weight: 750;
      }
      input {
        background: #fbfdfb;
        border: 1px solid var(--line);
        border-radius: 7px;
        font: inherit;
        min-height: 46px;
        padding: 11px 12px;
        width: 100%;
      }
      input:focus {
        border-color: var(--leaf);
        box-shadow: 0 0 0 3px rgba(56, 122, 74, 0.14);
        outline: none;
      }
      button {
        background: var(--leaf);
        border: 0;
        border-radius: 7px;
        color: #fff;
        cursor: pointer;
        font: inherit;
        font-weight: 750;
        min-height: 46px;
        padding: 10px 16px;
        width: 100%;
      }
      button:hover {
        background: var(--leaf-dark);
      }
      button:disabled {
        cursor: wait;
        opacity: 0.65;
      }
      #code-step {
        display: none;
      }
      #message {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
        margin-top: 14px;
        text-align: center;
      }
      #message.error {
        color: #a33a35;
      }
      .back-link {
        color: var(--leaf-dark);
        display: block;
        font-size: 13px;
        margin-top: 18px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <main>
      <img
        class="logo"
        src="/family-pantry-logo-transparent.png?v=2"
        alt="The Family Pantry"
      />
      <section class="card">
        <h1>Customer Sign In</h1>
        <p class="intro">
          We’ll email you a one-time code. Signing in creates an account using
          your email so you can manage saved payment methods.
        </p>

        <form id="email-step">
          <div class="field">
            <label for="email">Email Address</label>
            <input id="email" type="email" autocomplete="email" required />
          </div>
          <button id="send-button" type="submit">Email My Code</button>
        </form>

        <form id="code-step">
          <div class="field">
            <label for="code">Six-Digit Code</label>
            <input
              id="code"
              type="text"
              inputmode="numeric"
              autocomplete="one-time-code"
              maxlength="6"
              pattern="[0-9]{6}"
              required
            />
          </div>
          <button id="verify-button" type="submit">Sign In</button>
        </form>

        <div id="message" role="status"></div>
        <a class="back-link" href="/">Return to Checkout</a>
      </section>
    </main>

    <script>
      const emailStep = document.getElementById('email-step');
      const codeStep = document.getElementById('code-step');
      const emailInput = document.getElementById('email');
      const codeInput = document.getElementById('code');
      const sendButton = document.getElementById('send-button');
      const verifyButton = document.getElementById('verify-button');
      const message = document.getElementById('message');
      const redirect =
        new URLSearchParams(location.search).get('redirect') || '/account.html';

      function showMessage(text, isError = false) {
        message.textContent = text;
        message.classList.toggle('error', isError);
      }

      async function initializeSignIn() {
        try {
          const config = await fetch('/square-config').then((response) =>
            response.json(),
          );

          if (!config.customerAccountsEnabled) {
            emailInput.disabled = true;
            sendButton.disabled = true;
            showMessage(
              'Customer sign-in is coming soon while secure email delivery is being configured.',
            );
          }
        } catch (error) {
          emailInput.disabled = true;
          sendButton.disabled = true;
          showMessage('Customer sign-in is temporarily unavailable.', true);
        }
      }

      emailStep.addEventListener('submit', async (event) => {
        event.preventDefault();
        sendButton.disabled = true;
        showMessage('Sending your code...');

        try {
          const response = await fetch('/auth/request-code', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: emailInput.value }),
          });
          const result = await response.json();
          if (!response.ok) throw new Error(result.error);

          emailInput.disabled = true;
          emailStep.querySelector('button').style.display = 'none';
          codeStep.style.display = 'block';
          showMessage(result.message);
          codeInput.focus();
        } catch (error) {
          showMessage(error.message || 'Unable to send a code.', true);
        } finally {
          sendButton.disabled = false;
        }
      });

      codeStep.addEventListener('submit', async (event) => {
        event.preventDefault();
        verifyButton.disabled = true;
        showMessage('Signing you in...');

        try {
          const response = await fetch('/auth/verify-code', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              email: emailInput.value,
              code: codeInput.value,
            }),
          });
          const result = await response.json();
          if (!response.ok) throw new Error(result.error);
          location.href = redirect;
        } catch (error) {
          showMessage(error.message || 'Unable to verify that code.', true);
        } finally {
          verifyButton.disabled = false;
        }
      });

      initializeSignIn();
    </script>
  </body>
</html>
